name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  administration: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SHEETS_API_KEY: ${{ secrets.VITE_SHEETS_API_KEY }}
          VITE_SHEETS_ID: ${{ secrets.VITE_SHEETS_ID }}
          VITE_SHEETS_TAB: ${{ secrets.VITE_SHEETS_TAB }}
          VITE_SHEETS_WEBAPP_URL: ${{ secrets.VITE_SHEETS_WEBAPP_URL }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

      # Aponta o GitHub Pages para publicar a branch gh-pages (build), não a main (código-fonte).
      - name: Configure Pages source
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateInformationAboutPagesSite({
              owner: context.repo.owner,
              repo: context.repo.repo,
              build_type: 'legacy',
              source: { branch: 'gh-pages', path: '/' },
            });
            core.info('Pages configurado: branch gh-pages / root');

      - name: Trigger Pages rebuild
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.requestPagesBuild({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            core.info('Rebuild do Pages solicitado.');
